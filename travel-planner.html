<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Travel Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f4f8;
      --surface: #ffffff;
      --surface2: #f7f9fb;
      --border: #e2e8f0;
      --primary: #4f6ef7;
      --primary-dark: #3a56d4;
      --primary-light: #eef1fe;
      --text: #1a202c;
      --text-muted: #718096;
      --danger: #e53e3e;
      --danger-light: #fff5f5;
      --success: #38a169;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
      --shadow-lg: 0 8px 32px rgba(0,0,0,.12);
      --category-flight: #805ad5;
      --category-hotel: #d69e2e;
      --category-food: #e53e3e;
      --category-activity: #38a169;
      --category-transport: #3182ce;
      --category-shopping: #d53f8c;
      --category-other: #718096;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── TOP BAR ── */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .topbar-logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 18px; color: var(--primary); }
    .topbar-logo i { font-size: 20px; }
    .topbar-sep { flex: 1; }
    .trip-selector { display: flex; align-items: center; gap: 8px; }
    .trip-selector select {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 6px 10px;
      font-family: inherit;
      font-size: 14px;
      background: var(--surface2);
      color: var(--text);
      cursor: pointer;
      max-width: 220px;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 14px;
      border: none; border-radius: var(--radius-sm);
      font-family: inherit; font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all .15s;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--surface2); color: var(--text); }
    .btn-danger { background: var(--danger-light); color: var(--danger); border: 1px solid #fed7d7; }
    .btn-danger:hover { background: #fed7d7; }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn-icon { padding: 7px; border-radius: 50%; aspect-ratio: 1; }

    /* ── LAYOUT ── */
    .app { display: flex; height: calc(100vh - 60px); }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 280px; min-width: 240px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 10px;
    }
    .sidebar-header h2 { font-size: 13px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; }
    .days-list { flex: 1; overflow-y: auto; padding: 8px; }
    .day-item {
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      cursor: pointer;
      transition: background .12s;
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 2px;
    }
    .day-item:hover { background: var(--surface2); }
    .day-item.active { background: var(--primary-light); }
    .day-item.active .day-num { background: var(--primary); color: #fff; }
    .day-num {
      width: 32px; height: 32px;
      border-radius: 50%; background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; flex-shrink: 0;
      color: var(--text-muted);
    }
    .day-info { flex: 1; min-width: 0; }
    .day-label { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .day-date { font-size: 11px; color: var(--text-muted); }
    .day-count { font-size: 11px; color: var(--text-muted); background: var(--surface2); border-radius: 10px; padding: 1px 6px; }
    .sidebar-footer { padding: 12px 16px; border-top: 1px solid var(--border); }

    /* ── MAIN ── */
    .main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }

    /* ── EMPTY / NO TRIP ── */
    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; padding: 40px; text-align: center;
    }
    .empty-icon { font-size: 56px; color: var(--border); }
    .empty-state h2 { font-size: 22px; font-weight: 600; }
    .empty-state p { color: var(--text-muted); max-width: 360px; line-height: 1.6; }

    /* ── DAY HEADER ── */
    .day-header {
      padding: 24px 28px 0;
      display: flex; align-items: flex-start; gap: 16px; flex-wrap: wrap;
    }
    .day-header-info { flex: 1; min-width: 0; }
    .day-title { font-size: 22px; font-weight: 700; }
    .day-subtitle { font-size: 14px; color: var(--text-muted); margin-top: 2px; }
    .day-notes-wrap { margin: 0 28px; }
    .day-notes {
      width: 100%; margin-top: 12px;
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 10px 12px; font-family: inherit; font-size: 13px;
      background: var(--surface2); color: var(--text);
      resize: vertical; min-height: 56px;
      transition: border-color .15s;
    }
    .day-notes:focus { outline: none; border-color: var(--primary); background: var(--surface); }
    .day-notes::placeholder { color: #b0bec5; }

    /* ── TIMELINE ── */
    .timeline { padding: 20px 28px 40px; display: flex; flex-direction: column; gap: 0; }
    .timeline-empty {
      display: flex; flex-direction: column; align-items: center;
      gap: 12px; padding: 48px 0; color: var(--text-muted);
    }
    .timeline-empty i { font-size: 36px; opacity: .3; }

    .event-card {
      display: flex; gap: 0; position: relative;
    }
    .event-timeline-col {
      display: flex; flex-direction: column; align-items: center;
      width: 56px; flex-shrink: 0;
    }
    .event-time-label {
      font-size: 11px; font-weight: 600; color: var(--text-muted);
      white-space: nowrap; padding-top: 14px; width: 100%; text-align: center;
    }
    .event-connector { flex: 1; width: 2px; background: var(--border); margin-top: 4px; }
    .event-dot {
      width: 12px; height: 12px; border-radius: 50%;
      border: 2px solid var(--surface);
      position: absolute; left: 22px; top: 18px;
      box-shadow: 0 0 0 1px var(--border);
    }
    .event-body {
      flex: 1; min-width: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin: 8px 0 8px 12px;
      box-shadow: var(--shadow);
      transition: box-shadow .15s, border-color .15s;
    }
    .event-body:hover { box-shadow: var(--shadow-lg); border-color: #cbd5e0; }
    .event-top { display: flex; align-items: flex-start; gap: 8px; }
    .event-category-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .4px;
      padding: 2px 7px; border-radius: 20px; flex-shrink: 0; margin-top: 1px;
    }
    .event-title { font-size: 15px; font-weight: 600; flex: 1; }
    .event-actions { display: flex; gap: 4px; opacity: 0; transition: opacity .15s; }
    .event-body:hover .event-actions { opacity: 1; }
    .event-desc { font-size: 13px; color: var(--text-muted); margin-top: 6px; line-height: 1.55; }
    .event-meta { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 8px; }
    .event-meta-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text-muted); }

    /* category colors */
    .cat-flight  { background: #e9d8fd; color: var(--category-flight); }
    .cat-hotel   { background: #fefcbf; color: var(--category-hotel); }
    .cat-food    { background: #fed7d7; color: var(--category-food); }
    .cat-activity{ background: #c6f6d5; color: var(--category-activity); }
    .cat-transport{ background: #bee3f8; color: var(--category-transport); }
    .cat-shopping{ background: #fed7e2; color: var(--category-shopping); }
    .cat-other   { background: #e2e8f0; color: var(--category-other); }

    .dot-flight   { background: var(--category-flight); }
    .dot-hotel    { background: var(--category-hotel); }
    .dot-food     { background: var(--category-food); }
    .dot-activity { background: var(--category-activity); }
    .dot-transport{ background: var(--category-transport); }
    .dot-shopping { background: var(--category-shopping); }
    .dot-other    { background: var(--category-other); }

    /* ── MODAL ── */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,.45);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; padding: 20px;
      animation: fadeIn .15s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal {
      background: var(--surface); border-radius: var(--radius);
      width: 100%; max-width: 520px;
      box-shadow: var(--shadow-lg);
      animation: slideUp .18s ease;
      max-height: 90vh; display: flex; flex-direction: column;
    }
    @keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal-header {
      padding: 20px 24px 0;
      display: flex; align-items: center; gap: 12px;
    }
    .modal-header h2 { font-size: 18px; font-weight: 700; flex: 1; }
    .modal-body { padding: 20px 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; }
    .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }

    /* ── FORM FIELDS ── */
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .4px; }
    .field input, .field select, .field textarea {
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 9px 12px; font-family: inherit; font-size: 14px;
      background: var(--surface2); color: var(--text);
      transition: border-color .15s, background .15s;
    }
    .field input:focus, .field select:focus, .field textarea:focus {
      outline: none; border-color: var(--primary); background: var(--surface);
    }
    .field textarea { resize: vertical; min-height: 80px; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* ── TRIP FORM ── */
    .trip-summary {
      padding: 0 28px 0;
    }
    .trip-info-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      display: flex; flex-wrap: wrap; gap: 20px;
      box-shadow: var(--shadow);
      margin-top: 20px;
    }
    .trip-info-item { display: flex; flex-direction: column; gap: 3px; }
    .trip-info-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .4px; }
    .trip-info-value { font-size: 15px; font-weight: 500; }

    /* ── LOCATION SEARCH ── */
    .loc-search-wrap { position: relative; }
    .loc-search-row { display: flex; gap: 6px; }
    .loc-search-row input { flex: 1; }
    .loc-results {
      position: absolute; top: calc(100% + 4px); left: 0; right: 0;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); box-shadow: var(--shadow-lg);
      z-index: 300; max-height: 220px; overflow-y: auto;
    }
    .loc-result-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px 12px; cursor: pointer;
      border-bottom: 1px solid var(--border); transition: background .1s;
    }
    .loc-result-item:last-child { border-bottom: none; }
    .loc-result-item:hover { background: var(--primary-light); }
    .loc-result-item > i { color: var(--primary); margin-top: 2px; flex-shrink: 0; font-size: 13px; }
    .loc-result-text { flex: 1; min-width: 0; }
    .loc-result-name { font-size: 13px; font-weight: 500; }
    .loc-result-addr { font-size: 11px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .loc-result-empty, .loc-result-error { padding: 12px; font-size: 13px; color: var(--text-muted); text-align: center; }
    .loc-result-error { color: var(--danger); }
    .loc-chip {
      display: flex; align-items: center; gap: 8px;
      background: var(--primary-light); border: 1px solid #c3cffe;
      border-radius: var(--radius-sm); padding: 7px 10px; margin-top: 6px;
    }
    .loc-chip > i { color: var(--primary); flex-shrink: 0; }
    .loc-chip-name { flex: 1; font-size: 13px; font-weight: 500; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .loc-chip-maps {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; font-weight: 600; color: var(--primary); text-decoration: none;
      padding: 3px 8px; background: var(--surface); border: 1px solid #c3cffe;
      border-radius: 20px; flex-shrink: 0; transition: background .12s, color .12s;
    }
    .loc-chip-maps:hover { background: var(--primary); color: #fff; border-color: var(--primary); }
    .loc-chip-clear {
      background: none; border: none; cursor: pointer; color: var(--text-muted);
      width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; transition: background .1s, color .1s;
    }
    .loc-chip-clear:hover { background: var(--danger-light); color: var(--danger); }
    .loc-map-link {
      display: inline-flex; align-items: center; gap: 4px;
      color: var(--primary); text-decoration: none; font-size: 12px;
    }
    .loc-map-link:hover { text-decoration: underline; }
    .loc-map-link .fa-arrow-up-right-from-square { font-size: 9px; opacity: .7; }

    /* ── WISHLIST SIDEBAR ENTRY ── */
    .sidebar-wishlist {
      margin: 8px 8px 0;
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      cursor: pointer;
      display: flex; align-items: center; gap: 10px;
      border: 1px dashed var(--border);
      transition: background .12s, border-color .12s;
    }
    .sidebar-wishlist:hover { background: #fffbeb; border-color: #f6ad55; }
    .sidebar-wishlist.active { background: #fffbeb; border-color: #f6ad55; }
    .sidebar-wishlist.active .wish-sidebar-num { background: #ed8936; color: #fff; }
    .wish-sidebar-num {
      width: 32px; height: 32px; border-radius: 50%;
      background: #feebc8; display: flex; align-items: center; justify-content: center;
      font-size: 13px; flex-shrink: 0; color: #c05621;
    }
    .wish-sidebar-info { flex: 1; min-width: 0; }
    .wish-sidebar-label { font-size: 13px; font-weight: 600; color: #c05621; }
    .wish-sidebar-sub { font-size: 11px; color: var(--text-muted); }
    .wish-count { font-size: 11px; color: #c05621; background: #feebc8; border-radius: 10px; padding: 1px 6px; }

    /* ── WISHLIST VIEW ── */
    .wishlist-header {
      padding: 24px 28px 0;
      display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    }
    .wishlist-header-info { flex: 1; }
    .wishlist-title { font-size: 22px; font-weight: 700; }
    .wishlist-subtitle { font-size: 14px; color: var(--text-muted); margin-top: 2px; }
    .wishlist-body { padding: 20px 28px 40px; display: flex; flex-direction: column; gap: 0; }
    .wishlist-empty {
      display: flex; flex-direction: column; align-items: center;
      gap: 12px; padding: 48px 0; color: var(--text-muted);
    }
    .wishlist-empty i { font-size: 36px; opacity: .3; }
    .wish-section-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px;
      color: var(--text-muted); padding: 12px 0 6px;
    }
    .wish-item {
      display: flex; align-items: flex-start; gap: 12px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 13px 16px;
      margin-bottom: 8px; box-shadow: var(--shadow);
      transition: box-shadow .15s, border-color .15s, opacity .15s;
    }
    .wish-item:hover { box-shadow: var(--shadow-lg); border-color: #cbd5e0; }
    .wish-item.done { opacity: .55; }
    .wish-item.done .wish-name { text-decoration: line-through; color: var(--text-muted); }
    .wish-check {
      width: 20px; height: 20px; border-radius: 50%;
      border: 2px solid var(--border); flex-shrink: 0; margin-top: 2px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background .15s, border-color .15s; background: var(--surface);
    }
    .wish-check:hover { border-color: var(--success); }
    .wish-item.done .wish-check { background: var(--success); border-color: var(--success); color: #fff; }
    .wish-body { flex: 1; min-width: 0; }
    .wish-top { display: flex; align-items: flex-start; gap: 8px; }
    .wish-name { font-size: 14px; font-weight: 600; flex: 1; }
    .wish-actions { display: flex; gap: 4px; opacity: 0; transition: opacity .15s; }
    .wish-item:hover .wish-actions { opacity: 1; }
    .wish-meta { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 5px; }
    .wish-meta-item { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--text-muted); }
    .wish-notes { font-size: 12px; color: var(--text-muted); margin-top: 4px; font-style: italic; }
    .plan-btn {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 600; color: var(--primary);
      background: var(--primary-light); border: 1px solid #c3cffe;
      border-radius: 20px; padding: 3px 9px; cursor: pointer;
      transition: background .12s, color .12s; flex-shrink: 0;
      text-decoration: none;
    }
    .plan-btn:hover { background: var(--primary); color: #fff; border-color: var(--primary); }
    .wish-item.done .plan-btn { display: none; }

    /* ── FROM-WISHLIST PICKER in event modal ── */
    .from-wish-bar {
      display: flex; align-items: center; gap: 8px;
      background: #fffbeb; border: 1px dashed #f6ad55;
      border-radius: var(--radius-sm); padding: 8px 12px;
    }
    .from-wish-bar i { color: #ed8936; flex-shrink: 0; }
    .from-wish-bar select {
      flex: 1; border: none; background: transparent;
      font-family: inherit; font-size: 13px; color: var(--text);
      cursor: pointer;
    }
    .from-wish-bar select:focus { outline: none; }
    .wish-planned-chip {
      display: flex; align-items: center; gap: 8px;
      background: #f0fff4; border: 1px solid #9ae6b4;
      border-radius: var(--radius-sm); padding: 7px 10px; font-size: 13px;
    }
    .wish-planned-chip i { color: var(--success); }
    .wish-planned-chip span { flex: 1; font-weight: 500; }
    .wish-planned-chip button {
      background: none; border: none; cursor: pointer; color: var(--text-muted);
      width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    }
    .wish-planned-chip button:hover { background: #fed7d7; color: var(--danger); }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #cbd5e0; }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      .sidebar { width: 220px; min-width: 0; }
      .day-header, .day-notes-wrap, .timeline { padding-left: 16px; padding-right: 16px; }
      .field-row { grid-template-columns: 1fr; }
    }
    @media (max-width: 480px) {
      .app { flex-direction: column; }
      .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border); max-height: 180px; }
    }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-logo"><i class="fa-solid fa-paper-plane"></i> Travel Planner</div>
  <div class="topbar-sep"></div>
  <div class="trip-selector">
    <select id="tripSelect" onchange="switchTrip(this.value)">
      <option value="">— select a trip —</option>
    </select>
    <button class="btn btn-primary" onclick="openTripModal()"><i class="fa-solid fa-plus"></i> New Trip</button>
  </div>
</div>

<!-- MAIN APP -->
<div class="app">
  <!-- SIDEBAR: day list -->
  <aside class="sidebar" id="sidebar" style="display:none">
    <div class="sidebar-header">
      <h2><i class="fa-regular fa-calendar"></i>&nbsp; Itinerary</h2>
      <button class="btn btn-ghost btn-sm" style="width:100%" onclick="openAddDayModal()"><i class="fa-solid fa-plus"></i> Add Day</button>
    </div>
    <div id="sidebarWishlist" class="sidebar-wishlist" onclick="selectWishlist()">
      <div class="wish-sidebar-num"><i class="fa-solid fa-star"></i></div>

<script>
/* ════════════════════════════════════════════════
   DATA LAYER — localStorage
   Schema:
   {
     trips: {
       [id]: {
         id, name, destination, startDate, endDate, notes,
         days: [
           { id, date, label, notes, events: [
             { id, title, category, time, duration, location, desc }
           ]}
         ]
       }
     },
     activeTripId: string | null
   }
════════════════════════════════════════════════ */

const DB_KEY = 'travel-planner-v1';

function loadDB() {
  try { return JSON.parse(localStorage.getItem(DB_KEY)) || { trips: {}, activeTripId: null }; }
  catch { return { trips: {}, activeTripId: null }; }
}
function saveDB(db) { localStorage.setItem(DB_KEY, JSON.stringify(db)); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

/* ════════════════ STATE ════════════════ */
let db = loadDB();
let activeTripId = db.activeTripId || null;
let activeDayId = null;
let wishlistActive = false;         // sidebar showing wishlist view
let editingEventId = null;
let editingWishId = null;
let pendingWishItemId = null;       // wishlist item being planned into an activity
let selectedLocationData = null;    // for event modal location search
let selectedWishLocationData = null;// for wish modal location search
let locDebounceTimer = null;
let wishLocDebounceTimer = null;

/* ════════════════ INIT ════════════════ */
window.addEventListener('DOMContentLoaded', () => {
  refreshTripSelect();
  if (activeTripId && db.trips[activeTripId]) {
    loadTrip(activeTripId, true);
  }
  // close modal on backdrop click
  document.querySelectorAll('.modal-backdrop').forEach(el => {
    el.addEventListener('click', e => { if (e.target === el) el.style.display = 'none'; });
  });
});

/* ════════════════ TRIP SELECT ════════════════ */
function refreshTripSelect() {
  const sel = document.getElementById('tripSelect');
  const prev = sel.value;
  sel.innerHTML = '<option value="">— select a trip —</option>';
  Object.values(db.trips).sort((a,b) => a.name.localeCompare(b.name)).forEach(t => {
    const opt = document.createElement('option');
    opt.value = t.id; opt.textContent = t.name;
    sel.appendChild(opt);
  });
  sel.value = activeTripId || prev || '';
}

function switchTrip(id) {
  if (!id) {
    activeTripId = null; activeDayId = null;
    db.activeTripId = null; saveDB(db);
    showEmptyState(); hideSidebar(); return;
  }
  loadTrip(id);
}

/* ════════════════ LOAD TRIP ════════════════ */
function loadTrip(id, silent) {
  if (!db.trips[id]) return;
  activeTripId = id;
  activeDayId = null;
  wishlistActive = false;
  db.activeTripId = id; saveDB(db);
  // ensure wishlist array exists (backwards compat)
  if (!db.trips[id].wishlist) { db.trips[id].wishlist = []; saveDB(db); }
  document.getElementById('tripSelect').value = id;
  showSidebar();
  renderDaysList();
  refreshWishCount();
  // auto-select first day
  const trip = db.trips[id];
  if (trip.days && trip.days.length > 0) {
    selectDay(trip.days[0].id);
  } else {
    showNoDaySelected();
  }
}

/* ════════════════ SIDEBAR ════════════════ */
function showSidebar() {
  document.getElementById('sidebar').style.display = 'flex';
}
function hideSidebar() {
  document.getElementById('sidebar').style.display = 'none';
}
function renderDaysList() {
  const trip = db.trips[activeTripId];
  if (!trip) return;
  const list = document.getElementById('daysList');
  list.innerHTML = '';
  const sorted = [...(trip.days || [])].sort((a,b) => (a.date||'').localeCompare(b.date||''));
  sorted.forEach((day, idx) => {
    const div = document.createElement('div');
    div.className = 'day-item' + (day.id === activeDayId ? ' active' : '');
    div.onclick = () => selectDay(day.id);
    const evCount = (day.events||[]).length;
    div.innerHTML = `
      <div class="day-num">${idx+1}</div>
      <div class="day-info">
        <div class="day-label">${esc(day.label || formatDate(day.date))}</div>
        <div class="day-date">${day.label ? formatDate(day.date) : ''}</div>
      </div>
      ${evCount ? `<span class="day-count">${evCount}</span>` : ''}
    `;
    list.appendChild(div);
  });
}

/* ════════════════ DAY VIEW ════════════════ */
function selectDay(dayId) {
  activeDayId = dayId;
  wishlistActive = false;
  document.getElementById('sidebarWishlist').classList.remove('active');
  renderDaysList();
  renderDayView();
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('wishlistView').style.display = 'none';
  document.getElementById('dayView').style.display = 'block';
}

function showNoDaySelected() {
  document.getElementById('emptyState').style.display = 'flex';
  document.getElementById('emptyState').innerHTML = `
    <div class="empty-icon"><i class="fa-regular fa-calendar-plus"></i></div>
    <h2>No days yet</h2>
    <p>Add your first day to start planning your itinerary.</p>
    <button class="btn btn-primary" onclick="openAddDayModal()"><i class="fa-solid fa-plus"></i> Add Day</button>
  `;
  document.getElementById('dayView').style.display = 'none';
  document.getElementById('wishlistView').style.display = 'none';
}

function showEmptyState() {
  const es = document.getElementById('emptyState');
  es.innerHTML = `
    <div class="empty-icon"><i class="fa-solid fa-map-location-dot"></i></div>
    <h2>No trip selected</h2>
    <p>Create a new trip or select one above to start building your travel itinerary.</p>
    <button class="btn btn-primary" onclick="openTripModal()"><i class="fa-solid fa-plus"></i> Create Trip</button>
  `;
  es.style.display = 'flex';
  document.getElementById('dayView').style.display = 'none';
  document.getElementById('wishlistView').style.display = 'none';
}

function renderDayView() {
  const trip = db.trips[activeTripId];
  if (!trip) return;
  const day = (trip.days||[]).find(d => d.id === activeDayId);
  if (!day) return;

  const dayView = document.getElementById('dayView');

  // Sort events by time
  const events = [...(day.events||[])].sort((a,b) => (a.time||'').localeCompare(b.time||''));

  dayView.innerHTML = `
    <div class="day-header">
      <div class="day-header-info">
        <div class="day-title">${esc(day.label || formatDate(day.date))}</div>
        <div class="day-subtitle">${day.label ? formatDate(day.date) : ''}&nbsp;</div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-primary btn-sm" onclick="openAddEventModal()">
          <i class="fa-solid fa-plus"></i> Add Activity
        </button>
        <button class="btn btn-ghost btn-sm" onclick="openEditDayModal()">
          <i class="fa-solid fa-pen"></i> Edit Day
        </button>
        <button class="btn btn-danger btn-sm" onclick="confirmDeleteDay()">
          <i class="fa-solid fa-trash"></i>
        </button>
      </div>
    </div>
    <div class="day-notes-wrap">
      <textarea class="day-notes" placeholder="Day notes — plans, reminders, mood…"
        oninput="saveDayNotes(this.value)">${esc(day.notes||'')}</textarea>
    </div>
    <div class="timeline" id="timeline">
      ${events.length === 0 ? `
        <div class="timeline-empty">
          <i class="fa-regular fa-clock"></i>
          <span>No activities yet — click <strong>Add Activity</strong> to get started.</span>
        </div>
      ` : events.map(ev => renderEventCard(ev)).join('')}
    </div>
  `;
}

function renderEventCard(ev) {
  const catIcon = {
    flight: 'fa-plane', hotel: 'fa-bed', food: 'fa-utensils',
    activity: 'fa-binoculars', transport: 'fa-train', shopping: 'fa-bag-shopping', other: 'fa-star'
  }[ev.category] || 'fa-star';

  const catLabel = {
    flight: 'Flight', hotel: 'Hotel', food: 'Food & Dining',
    activity: 'Activity', transport: 'Transport', shopping: 'Shopping', other: 'Other'
  }[ev.category] || 'Other';

  return `
    <div class="event-card">
      <div class="event-timeline-col">
        <div class="event-time-label">${ev.time || '—'}</div>
        <div class="event-connector"></div>
      </div>
      <div class="event-dot dot-${ev.category||'other'}"></div>
      <div class="event-body">
        <div class="event-top">
          <span class="event-category-badge cat-${ev.category||'other'}">
            <i class="fa-solid ${catIcon}"></i> ${catLabel}
          </span>
          <div class="event-title">${esc(ev.title)}</div>
          <div class="event-actions">
            <button class="btn btn-ghost btn-icon btn-sm" title="Edit" onclick="openEditEventModal('${ev.id}')">
              <i class="fa-solid fa-pen fa-xs"></i>
            </button>
            <button class="btn btn-danger btn-icon btn-sm" title="Delete" onclick="deleteEvent('${ev.id}')">
              <i class="fa-solid fa-trash fa-xs"></i>
            </button>
          </div>
        </div>
        ${ev.desc ? `<div class="event-desc">${esc(ev.desc)}</div>` : ''}
        <div class="event-meta">
          ${ev.time ? `<span class="event-meta-item"><i class="fa-regular fa-clock"></i> ${ev.time}</span>` : ''}
          ${ev.duration ? `<span class="event-meta-item"><i class="fa-solid fa-hourglass-half"></i> ${esc(ev.duration)}</span>` : ''}
          ${ev.location ? `<span class="event-meta-item">
            <a href="${buildMapsUrl(ev.locationLat, ev.locationLng, ev.location)}" target="_blank" rel="noopener" class="loc-map-link">
              <i class="fa-solid fa-location-dot"></i> ${esc(ev.location)}
              <i class="fa-solid fa-arrow-up-right-from-square"></i>
            </a>
          </span>` : ''}
        </div>
      </div>
    </div>
  `;
}

/* ════════════════ TRIP MODAL ════════════════ */
function openTripModal(tripId) {
  const modal = document.getElementById('tripModal');
  document.getElementById('tripModalTitle').textContent = tripId ? 'Edit Trip' : 'New Trip';
  if (tripId) {
    const t = db.trips[tripId];
    document.getElementById('tf_name').value = t.name || '';
    document.getElementById('tf_dest').value = t.destination || '';
    document.getElementById('tf_start').value = t.startDate || '';
    document.getElementById('tf_end').value = t.endDate || '';
    document.getElementById('tf_notes').value = t.notes || '';
    modal.dataset.editId = tripId;
  } else {
    document.getElementById('tf_name').value = '';
    document.getElementById('tf_dest').value = '';
    document.getElementById('tf_start').value = '';
    document.getElementById('tf_end').value = '';
    document.getElementById('tf_notes').value = '';
    delete modal.dataset.editId;
  }
  modal.style.display = 'flex';
  setTimeout(() => document.getElementById('tf_name').focus(), 80);
}

function saveTrip() {
  const name = document.getElementById('tf_name').value.trim();
  if (!name) { document.getElementById('tf_name').focus(); return; }
  const modal = document.getElementById('tripModal');
  const editId = modal.dataset.editId;
  const id = editId || uid();
  const existing = db.trips[id] || {};
  db.trips[id] = {
    ...existing,
    id,
    name,
    destination: document.getElementById('tf_dest').value.trim(),
    startDate: document.getElementById('tf_start').value,
    endDate: document.getElementById('tf_end').value,
    notes: document.getElementById('tf_notes').value.trim(),
    days: existing.days || [],
  };
  saveDB(db);
  closeModal('tripModal');
  refreshTripSelect();
  loadTrip(id);
}

/* ════════════════ DAY MODAL ════════════════ */
function openAddDayModal() {
  document.getElementById('df_date').value = '';
  document.getElementById('df_label').value = '';
  delete document.getElementById('addDayModal').dataset.editId;
  document.getElementById('addDayModal').style.display = 'flex';
  setTimeout(() => document.getElementById('df_date').focus(), 80);
}

function openEditDayModal() {
  const trip = db.trips[activeTripId];
  const day = (trip?.days||[]).find(d => d.id === activeDayId);
  if (!day) return;
  document.getElementById('df_date').value = day.date || '';
  document.getElementById('df_label').value = day.label || '';
  document.getElementById('addDayModal').dataset.editId = day.id;
  document.getElementById('addDayModal').style.display = 'flex';
}

function saveDay() {
  const date = document.getElementById('df_date').value;
  const label = document.getElementById('df_label').value.trim();
  if (!date) { document.getElementById('df_date').focus(); return; }

  const trip = db.trips[activeTripId];
  if (!trip) return;
  const editId = document.getElementById('addDayModal').dataset.editId;

  if (editId) {
    const day = trip.days.find(d => d.id === editId);
    if (day) { day.date = date; day.label = label; }
  } else {
    const id = uid();
    trip.days = [...(trip.days||[]), { id, date, label, notes: '', events: [] }];
    activeDayId = id;
  }
  saveDB(db);
  closeModal('addDayModal');
  renderDaysList();
  if (editId) {
    renderDayView();
  } else {
    selectDay(activeDayId);
  }
}

/* ════════════════ EVENT MODAL ════════════════ */
function openAddEventModal(prefill) {
  editingEventId = null;
  document.getElementById('eventModalTitle').textContent = 'Add Activity';
  document.getElementById('ef_time').value = '';
  document.getElementById('ef_duration').value = '';
  document.getElementById('ef_desc').value = '';
  clearLocationData(true);
  hideLocResults();
  document.getElementById('wishPlannedChip').style.display = 'none';
  refreshWishlistPicker();
  if (prefill) {
    // called from openAddEventFromWish
    document.getElementById('ef_title').value = prefill.name || '';
    document.getElementById('ef_category').value = prefill.category || 'activity';
    document.getElementById('ef_location').value = prefill.location || '';
    if (prefill.locationLat != null && prefill.locationLng != null) {
      document.getElementById('ef_loc_lat').value = prefill.locationLat;
      document.getElementById('ef_loc_lng').value = prefill.locationLng;
      selectedLocationData = { shortName: prefill.location, displayName: prefill.location, lat: prefill.locationLat, lng: prefill.locationLng };
      renderLocChip(selectedLocationData);
    }
    document.getElementById('wishPicker').value = pendingWishItemId || '';
    showWishPlannedChip(prefill);
  } else {
    pendingWishItemId = null;
    document.getElementById('ef_title').value = '';
    document.getElementById('ef_category').value = 'activity';
  }
  document.getElementById('eventModal').style.display = 'flex';
  setTimeout(() => document.getElementById('ef_title').focus(), 80);
}

function openEditEventModal(eventId) {
  const trip = db.trips[activeTripId];
  const day = (trip?.days||[]).find(d => d.id === activeDayId);
  const ev = (day?.events||[]).find(e => e.id === eventId);
  if (!ev) return;
  editingEventId = eventId;
  pendingWishItemId = null;
  document.getElementById('fromWishRow').style.display = 'none';
  document.getElementById('wishPlannedChip').style.display = 'none';
  document.getElementById('eventModalTitle').textContent = 'Edit Activity';
  document.getElementById('ef_title').value = ev.title || '';
  document.getElementById('ef_category').value = ev.category || 'activity';
  document.getElementById('ef_time').value = ev.time || '';
  document.getElementById('ef_duration').value = ev.duration || '';
  document.getElementById('ef_desc').value = ev.desc || '';
  // Restore location
  clearLocationData(true);
  hideLocResults();
  document.getElementById('ef_location').value = ev.location || '';
  if (ev.locationLat != null && ev.locationLng != null) {
    document.getElementById('ef_loc_lat').value = ev.locationLat;
    document.getElementById('ef_loc_lng').value = ev.locationLng;
    selectedLocationData = { shortName: ev.location, displayName: ev.location, lat: ev.locationLat, lng: ev.locationLng };
    renderLocChip(selectedLocationData);
  }
  document.getElementById('eventModal').style.display = 'flex';
  setTimeout(() => document.getElementById('ef_title').focus(), 80);
}

function saveEvent() {
  const title = document.getElementById('ef_title').value.trim();
  if (!title) { document.getElementById('ef_title').focus(); return; }

  const trip = db.trips[activeTripId];
  const day = (trip?.days||[]).find(d => d.id === activeDayId);
  if (!day) return;

  const locLat = parseFloat(document.getElementById('ef_loc_lat').value);
  const locLng = parseFloat(document.getElementById('ef_loc_lng').value);
  const data = {
    title,
    category: document.getElementById('ef_category').value,
    time: document.getElementById('ef_time').value,
    duration: document.getElementById('ef_duration').value.trim(),
    location: document.getElementById('ef_location').value.trim(),
    locationLat: isNaN(locLat) ? null : locLat,
    locationLng: isNaN(locLng) ? null : locLng,
    desc: document.getElementById('ef_desc').value.trim(),
  };

  if (editingEventId) {
    const idx = day.events.findIndex(e => e.id === editingEventId);
    if (idx !== -1) day.events[idx] = { ...day.events[idx], ...data };
  } else {
    day.events = [...(day.events||[]), { id: uid(), ...data }];
  }
  // If planned from wishlist, mark that item done
  if (pendingWishItemId && !editingEventId) {
    const wl = getWishlist();
    const wi = wl.find(w => w.id === pendingWishItemId);
    if (wi) wi.done = true;
    pendingWishItemId = null;
  }
  saveDB(db);
  closeModal('eventModal');
  refreshWishCount();
  renderDaysList();
  renderDayView();
}

/* ════════════════ DELETE ════════════════ */
function deleteEvent(eventId) {
  if (!confirm('Delete this activity?')) return;
  const trip = db.trips[activeTripId];
  const day = (trip?.days||[]).find(d => d.id === activeDayId);
  if (!day) return;
  day.events = (day.events||[]).filter(e => e.id !== eventId);
  saveDB(db);
  renderDaysList();
  renderDayView();
}

function confirmDeleteDay() {
  const trip = db.trips[activeTripId];
  const day = (trip?.days||[]).find(d => d.id === activeDayId);
  if (!day) return;
  if (!confirm(`Delete day "${day.label || formatDate(day.date)}"? All activities will be lost.`)) return;
  trip.days = trip.days.filter(d => d.id !== activeDayId);
  saveDB(db);
  activeDayId = null;
  renderDaysList();
  if (trip.days.length > 0) selectDay(trip.days[0].id);
  else showNoDaySelected();
}

function confirmDeleteTrip() {
  const trip = db.trips[activeTripId];
  if (!trip) return;
  if (!confirm(`Delete trip "${trip.name}"? This cannot be undone.`)) return;
  delete db.trips[activeTripId];
  activeTripId = null; activeDayId = null;
  db.activeTripId = null;
  saveDB(db);
  refreshTripSelect();
  hideSidebar();
  showEmptyState();
}

/* ════════════════ DAY NOTES ════════════════ */
function saveDayNotes(val) {
  const trip = db.trips[activeTripId];
  const day = (trip?.days||[]).find(d => d.id === activeDayId);
  if (day) { day.notes = val; saveDB(db); }
}

/* ════════════════ WISHLIST ════════════════ */
function getWishlist() {
  const trip = db.trips[activeTripId];
  if (!trip) return [];
  if (!trip.wishlist) trip.wishlist = [];
  return trip.wishlist;
}

function refreshWishCount() {
  const wl = getWishlist();
  const remaining = wl.filter(w => !w.done).length;
  const el = document.getElementById('wishCount');
  if (!el) return;
  if (wl.length === 0) { el.style.display = 'none'; return; }
  el.textContent = remaining + '/' + wl.length;
  el.style.display = '';
}

function selectWishlist() {
  wishlistActive = true;
  activeDayId = null;
  document.getElementById('sidebarWishlist').classList.add('active');
  renderDaysList(); // clears active from day items
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('dayView').style.display = 'none';
  document.getElementById('wishlistView').style.display = 'block';
  renderWishlistView();
}

function renderWishlistView() {
  const trip = db.trips[activeTripId];
  if (!trip) return;
  const wl = getWishlist();
  const pending = wl.filter(w => !w.done);
  const done = wl.filter(w => w.done);

  document.getElementById('wishlistView').innerHTML = `
    <div class="wishlist-header">
      <div class="wishlist-header-info">
        <div class="wishlist-title"><i class="fa-solid fa-star" style="color:#ed8936;font-size:18px"></i> Travel Wishlist</div>
        <div class="wishlist-subtitle">${esc(trip.name)} &mdash; ${wl.length} place${wl.length !== 1 ? 's' : ''}, ${pending.length} remaining</div>
      </div>
      <button class="btn btn-primary btn-sm" onclick="openAddWishModal()">
        <i class="fa-solid fa-plus"></i> Add to Wishlist
      </button>
    </div>
    <div class="wishlist-body">
      ${wl.length === 0 ? `
        <div class="wishlist-empty">
          <i class="fa-regular fa-star"></i>
          <span>Your wishlist is empty &mdash; add places you want to visit!</span>
        </div>
      ` : `
        ${pending.length > 0 ? `
          <div class="wish-section-label"><i class="fa-solid fa-circle-dot fa-xs"></i> To Visit (${pending.length})</div>
          ${pending.map(w => renderWishCard(w)).join('')}
        ` : ''}
        ${done.length > 0 ? `
          <div class="wish-section-label"><i class="fa-solid fa-check fa-xs"></i> Visited / Planned (${done.length})</div>
          ${done.map(w => renderWishCard(w)).join('')}
        ` : ''}
      `}
    </div>
  `;
}

function renderWishCard(w) {
  const catIcon = { flight:'fa-plane', hotel:'fa-bed', food:'fa-utensils',
    activity:'fa-binoculars', transport:'fa-train', shopping:'fa-bag-shopping', other:'fa-star' }[w.category] || 'fa-star';
  const locLink = w.location
    ? `<span class="wish-meta-item">
        <a href="${buildMapsUrl(w.locationLat, w.locationLng, w.location)}" target="_blank" rel="noopener" class="loc-map-link">
          <i class="fa-solid fa-location-dot"></i> ${esc(w.location)}
          <i class="fa-solid fa-arrow-up-right-from-square"></i>
        </a>
       </span>` : '';
  return `
    <div class="wish-item${w.done ? ' done' : ''}" id="wish-${w.id}">
      <div class="wish-check" onclick="toggleWishDone('${w.id}')" title="${w.done ? 'Mark as not visited' : 'Mark as visited'}">
        ${w.done ? '<i class="fa-solid fa-check fa-xs"></i>' : ''}
      </div>
      <div class="wish-body">
        <div class="wish-top">
          <span class="event-category-badge cat-${w.category||'other'}">
            <i class="fa-solid ${catIcon}"></i> ${w.category||'other'}
          </span>
          <div class="wish-name">${esc(w.name)}</div>
          <div class="wish-actions">
            <button class="btn btn-ghost btn-icon btn-sm" title="Edit" onclick="openEditWishModal('${w.id}')">
              <i class="fa-solid fa-pen fa-xs"></i>
            </button>
            <button class="btn btn-danger btn-icon btn-sm" title="Delete" onclick="deleteWishItem('${w.id}')">
              <i class="fa-solid fa-trash fa-xs"></i>
            </button>
          </div>
        </div>
        ${w.notes ? `<div class="wish-notes">${esc(w.notes)}</div>` : ''}
        <div class="wish-meta">
          ${locLink}
        </div>
      </div>
      ${!w.done ? `<button class="plan-btn" onclick="openAddEventFromWish('${w.id}')">
        <i class="fa-regular fa-calendar-plus"></i> Plan this
      </button>` : ''}
    </div>
  `;
}

function toggleWishDone(id) {
  const wl = getWishlist();
  const item = wl.find(w => w.id === id);
  if (!item) return;
  item.done = !item.done;
  saveDB(db);
  refreshWishCount();
  renderWishlistView();
}

function deleteWishItem(id) {
  if (!confirm('Remove this item from the wishlist?')) return;
  const trip = db.trips[activeTripId];
  trip.wishlist = trip.wishlist.filter(w => w.id !== id);
  saveDB(db);
  refreshWishCount();
  renderWishlistView();
}

/* ── Wish modal open/save ── */
function openAddWishModal() {
  editingWishId = null;
  document.getElementById('wishModalTitle').textContent = 'Add to Wishlist';
  document.getElementById('wf_name').value = '';
  document.getElementById('wf_category').value = 'activity';
  document.getElementById('wf_notes').value = '';
  clearWishLocationData(true);
  hideWishLocResults();
  document.getElementById('wishModal').style.display = 'flex';
  setTimeout(() => document.getElementById('wf_name').focus(), 80);
}

function openEditWishModal(id) {
  const item = getWishlist().find(w => w.id === id);
  if (!item) return;
  editingWishId = id;
  document.getElementById('wishModalTitle').textContent = 'Edit Wishlist Item';
  document.getElementById('wf_name').value = item.name || '';
  document.getElementById('wf_category').value = item.category || 'activity';
  document.getElementById('wf_notes').value = item.notes || '';
  clearWishLocationData(true);
  hideWishLocResults();
  document.getElementById('wf_location').value = item.location || '';
  if (item.locationLat != null && item.locationLng != null) {
    document.getElementById('wf_loc_lat').value = item.locationLat;
    document.getElementById('wf_loc_lng').value = item.locationLng;
    selectedWishLocationData = { shortName: item.location, displayName: item.location, lat: item.locationLat, lng: item.locationLng };
    renderWishLocChip(selectedWishLocationData);
  }
  document.getElementById('wishModal').style.display = 'flex';
  setTimeout(() => document.getElementById('wf_name').focus(), 80);
}

function saveWishItem() {
  const name = document.getElementById('wf_name').value.trim();
  if (!name) { document.getElementById('wf_name').focus(); return; }
  const trip = db.trips[activeTripId];
  if (!trip) return;
  if (!trip.wishlist) trip.wishlist = [];
  const locLat = parseFloat(document.getElementById('wf_loc_lat').value);
  const locLng = parseFloat(document.getElementById('wf_loc_lng').value);
  const data = {
    name,
    category: document.getElementById('wf_category').value,
    location: document.getElementById('wf_location').value.trim(),
    locationLat: isNaN(locLat) ? null : locLat,
    locationLng: isNaN(locLng) ? null : locLng,
    notes: document.getElementById('wf_notes').value.trim(),
  };
  if (editingWishId) {
    const idx = trip.wishlist.findIndex(w => w.id === editingWishId);
    if (idx !== -1) trip.wishlist[idx] = { ...trip.wishlist[idx], ...data };
  } else {
    trip.wishlist.push({ id: uid(), done: false, ...data });
  }
  saveDB(db);
  closeModal('wishModal');
  refreshWishCount();
  renderWishlistView();
}

/* ── Plan a wishlist item into an activity ── */
function openAddEventFromWish(wishId) {
  const item = getWishlist().find(w => w.id === wishId);
  if (!item) return;
  // pick a day to plan it into — if one is already active use it, else ask
  if (!activeDayId) {
    const trip = db.trips[activeTripId];
    if (!trip || !trip.days || trip.days.length === 0) {
      alert('Add a day to your itinerary first, then plan this item.');
      return;
    }
    // switch to first day automatically
    selectDay(trip.days[0].id);
  }
  pendingWishItemId = wishId;
  openAddEventModal(item);
}

/* ── wishlist picker inside event modal ── */
function refreshWishlistPicker() {
  const sel = document.getElementById('wishPicker');
  const row = document.getElementById('fromWishRow');
  if (!sel || !activeTripId) return;
  const wl = getWishlist().filter(w => !w.done);
  sel.innerHTML = '<option value="">— pick from wishlist —</option>'
    + wl.map(w => `<option value="${w.id}">${esc(w.name)}${w.location ? ' · ' + esc(w.location) : ''}</option>`).join('');
  row.style.display = wl.length > 0 ? 'flex' : 'none';
}

function applyWishlistPick(wishId) {
  if (!wishId) {
    pendingWishItemId = null;
    document.getElementById('wishPlannedChip').style.display = 'none';
    document.getElementById('ef_title').value = '';
    clearLocationData(true);
    return;
  }
  const item = getWishlist().find(w => w.id === wishId);
  if (!item) return;
  pendingWishItemId = wishId;
  document.getElementById('ef_title').value = item.name;
  document.getElementById('ef_category').value = item.category || 'activity';
  clearLocationData(true);
  document.getElementById('ef_location').value = item.location || '';
  if (item.locationLat != null && item.locationLng != null) {
    document.getElementById('ef_loc_lat').value = item.locationLat;
    document.getElementById('ef_loc_lng').value = item.locationLng;
    selectedLocationData = { shortName: item.location, displayName: item.location, lat: item.locationLat, lng: item.locationLng };
    renderLocChip(selectedLocationData);
  }
  showWishPlannedChip(item);
}

function showWishPlannedChip(item) {
  const chip = document.getElementById('wishPlannedChip');
  chip.innerHTML = `<i class="fa-solid fa-star"></i>
    <span>From wishlist: <strong>${esc(item.name)}</strong> — will be crossed off when saved</span>
    <button onclick="clearWishPick()" title="Unlink"><i class="fa-solid fa-xmark fa-xs"></i></button>`;
  chip.style.display = 'flex';
}

function clearWishPick() {
  pendingWishItemId = null;
  document.getElementById('wishPicker').value = '';
  document.getElementById('wishPlannedChip').style.display = 'none';
}

/* ════════════════ LOCATION SEARCH (Nominatim / OSM) ════════════════ */
function onLocationInput(val) {
  // If user edits the text manually away from a pinned result, drop the coordinates
  if (selectedLocationData && val.trim() !== selectedLocationData.shortName) {
    selectedLocationData = null;
    document.getElementById('ef_loc_lat').value = '';
    document.getElementById('ef_loc_lng').value = '';
    document.getElementById('locChip').style.display = 'none';
  }
  clearTimeout(locDebounceTimer);
  if (val.trim().length < 2) { hideLocResults(); return; }
  locDebounceTimer = setTimeout(() => doLocationSearch(val.trim()), 500);
}

function triggerLocationSearch() {
  const q = document.getElementById('ef_location').value.trim();
  if (q.length < 2) return;
  clearTimeout(locDebounceTimer);
  doLocationSearch(q);
}

async function doLocationSearch(query) {
  const btn = document.getElementById('locSearchBtn');
  const resultsEl = document.getElementById('locResults');
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
  resultsEl.style.display = 'none';
  try {
    const url = 'https://nominatim.openstreetmap.org/search?q='
      + encodeURIComponent(query)
      + '&format=json&limit=6&addressdetails=1';
    const res = await fetch(url, {
      headers: { 'Accept-Language': 'en', 'User-Agent': 'TravelPlannerApp/1.0' }
    });
    if (!res.ok) throw new Error('Network error');
    const data = await res.json();
    showLocResults(data);
  } catch (e) {
    resultsEl.innerHTML = '<div class="loc-result-error"><i class="fa-solid fa-circle-exclamation"></i> Search failed — check your connection.</div>';
    resultsEl.style.display = 'block';
  } finally {
    btn.innerHTML = '<i class="fa-solid fa-magnifying-glass"></i>';
  }
}

function showLocResults(results) {
  const el = document.getElementById('locResults');
  if (!results || results.length === 0) {
    el.innerHTML = '<div class="loc-result-empty">No places found — try a different search.</div>';
    el.style.display = 'block';
    return;
  }
  el._results = results;
  el.innerHTML = results.map((r, i) => {
    const name = r.name || r.display_name.split(',')[0].trim();
    const addr = r.display_name;
    return `<div class="loc-result-item" onclick="pickLocation(${i})">
      <i class="fa-solid fa-location-dot"></i>
      <div class="loc-result-text">
        <div class="loc-result-name">${esc(name)}</div>
        <div class="loc-result-addr">${esc(addr)}</div>
      </div>
    </div>`;
  }).join('');
  el.style.display = 'block';
}

function pickLocation(idx) {
  const el = document.getElementById('locResults');
  const r = el._results && el._results[idx];
  if (!r) return;
  const shortName = r.name || r.display_name.split(',')[0].trim();
  selectedLocationData = {
    shortName,
    displayName: r.display_name,
    lat: parseFloat(r.lat),
    lng: parseFloat(r.lon),
  };
  document.getElementById('ef_location').value = shortName;
  document.getElementById('ef_loc_lat').value = selectedLocationData.lat;
  document.getElementById('ef_loc_lng').value = selectedLocationData.lng;
  hideLocResults();
  renderLocChip(selectedLocationData);
}

function renderLocChip(loc) {
  const chip = document.getElementById('locChip');
  const mapsUrl = buildMapsUrl(loc.lat, loc.lng, loc.shortName);
  chip.innerHTML = `
    <i class="fa-solid fa-location-dot"></i>
    <span class="loc-chip-name" title="${esc(loc.displayName || loc.shortName)}">${esc(loc.shortName)}</span>
    <a href="${mapsUrl}" target="_blank" rel="noopener" class="loc-chip-maps">
      <i class="fa-solid fa-map"></i> Maps
    </a>
    <button class="loc-chip-clear" onclick="clearLocationData(true)" title="Remove linked location">
      <i class="fa-solid fa-xmark fa-xs"></i>
    </button>
  `;
  chip.style.display = 'flex';
}

function hideLocResults() {
  const el = document.getElementById('locResults');
  el.style.display = 'none';
  el.innerHTML = '';
  el._results = null;
}

function clearLocationData(clearInput) {
  selectedLocationData = null;
  document.getElementById('ef_loc_lat').value = '';
  document.getElementById('ef_loc_lng').value = '';
  document.getElementById('locChip').style.display = 'none';
  document.getElementById('locChip').innerHTML = '';
  if (clearInput) document.getElementById('ef_location').value = '';
}

/* ── Wish modal location search (mirrors event modal) ── */
function onWishLocationInput(val) {
  if (selectedWishLocationData && val.trim() !== selectedWishLocationData.shortName) {
    selectedWishLocationData = null;
    document.getElementById('wf_loc_lat').value = '';
    document.getElementById('wf_loc_lng').value = '';
    document.getElementById('wishLocChip').style.display = 'none';
  }
  clearTimeout(wishLocDebounceTimer);
  if (val.trim().length < 2) { hideWishLocResults(); return; }
  wishLocDebounceTimer = setTimeout(() => doWishLocationSearch(val.trim()), 500);
}

function triggerWishLocationSearch() {
  const q = document.getElementById('wf_location').value.trim();
  if (q.length < 2) return;
  clearTimeout(wishLocDebounceTimer);
  doWishLocationSearch(q);
}

async function doWishLocationSearch(query) {
  const btn = document.getElementById('wishLocSearchBtn');
  const resultsEl = document.getElementById('wishLocResults');
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
  resultsEl.style.display = 'none';
  try {
    const url = 'https://nominatim.openstreetmap.org/search?q='
      + encodeURIComponent(query) + '&format=json&limit=6&addressdetails=1';
    const res = await fetch(url, { headers: { 'Accept-Language': 'en', 'User-Agent': 'TravelPlannerApp/1.0' } });
    if (!res.ok) throw new Error();
    const data = await res.json();
    showWishLocResults(data);
  } catch {
    resultsEl.innerHTML = '<div class="loc-result-error"><i class="fa-solid fa-circle-exclamation"></i> Search failed.</div>';
    resultsEl.style.display = 'block';
  } finally {
    btn.innerHTML = '<i class="fa-solid fa-magnifying-glass"></i>';
  }
}

function showWishLocResults(results) {
  const el = document.getElementById('wishLocResults');
  if (!results || results.length === 0) {
    el.innerHTML = '<div class="loc-result-empty">No places found.</div>';
    el.style.display = 'block'; return;
  }
  el._results = results;
  el.innerHTML = results.map((r, i) => {
    const name = r.name || r.display_name.split(',')[0].trim();
    return `<div class="loc-result-item" onclick="pickWishLocation(${i})">
      <i class="fa-solid fa-location-dot"></i>
      <div class="loc-result-text">
        <div class="loc-result-name">${esc(name)}</div>
        <div class="loc-result-addr">${esc(r.display_name)}</div>
      </div>
    </div>`;
  }).join('');
  el.style.display = 'block';
}

function pickWishLocation(idx) {
  const el = document.getElementById('wishLocResults');
  const r = el._results && el._results[idx];
  if (!r) return;
  const shortName = r.name || r.display_name.split(',')[0].trim();
  selectedWishLocationData = { shortName, displayName: r.display_name, lat: parseFloat(r.lat), lng: parseFloat(r.lon) };
  document.getElementById('wf_location').value = shortName;
  document.getElementById('wf_loc_lat').value = selectedWishLocationData.lat;
  document.getElementById('wf_loc_lng').value = selectedWishLocationData.lng;
  hideWishLocResults();
  renderWishLocChip(selectedWishLocationData);
}

function renderWishLocChip(loc) {
  const chip = document.getElementById('wishLocChip');
  const mapsUrl = buildMapsUrl(loc.lat, loc.lng, loc.shortName);
  chip.innerHTML = `
    <i class="fa-solid fa-location-dot"></i>
    <span class="loc-chip-name" title="${esc(loc.displayName||loc.shortName)}">${esc(loc.shortName)}</span>
    <a href="${mapsUrl}" target="_blank" rel="noopener" class="loc-chip-maps"><i class="fa-solid fa-map"></i> Maps</a>
    <button class="loc-chip-clear" onclick="clearWishLocationData(true)" title="Remove">
      <i class="fa-solid fa-xmark fa-xs"></i>
    </button>`;
  chip.style.display = 'flex';
}

function hideWishLocResults() {
  const el = document.getElementById('wishLocResults');
  if (!el) return;
  el.style.display = 'none'; el.innerHTML = ''; el._results = null;
}

function clearWishLocationData(clearInput) {
  selectedWishLocationData = null;
  document.getElementById('wf_loc_lat').value = '';
  document.getElementById('wf_loc_lng').value = '';
  document.getElementById('wishLocChip').style.display = 'none';
  document.getElementById('wishLocChip').innerHTML = '';
  if (clearInput) document.getElementById('wf_location').value = '';
}

function buildMapsUrl(lat, lng, name) {
  if (lat != null && lng != null) {
    return 'https://www.google.com/maps/search/?api=1&query=' + lat + ',' + lng;
  }
  return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(name || '');
}

/* ════════════════ UTILS ════════════════ */
function closeModal(id) { document.getElementById(id).style.display = 'none'; }

function formatDate(str) {
  if (!str) return '';
  const d = new Date(str + 'T00:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
}

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Close location dropdowns when clicking outside
document.addEventListener('click', e => {
  if (!e.target.closest('.loc-search-wrap')) {
    hideLocResults();
    hideWishLocResults();
  }
});

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    const resultsEl = document.getElementById('locResults');
    if (resultsEl && resultsEl.style.display !== 'none') {
      hideLocResults(); return;
    }
    document.querySelectorAll('.modal-backdrop').forEach(el => { el.style.display = 'none'; });
  }
});
</script>
